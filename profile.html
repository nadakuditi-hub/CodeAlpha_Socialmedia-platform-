<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Instagram</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP NAV -->
<div class="navbar">
  <a href="index.html">← Home</a>
  <h3>Profile</h3>
  <i class="fa-solid fa-bars"></i>
</div>
<!-- PROFILE HEADER -->
<section class="profile-header">

  <img id="profilePic"
     src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
     onclick="document.getElementById('newPic').click()">

  <div class="profile-info">

      <div class="stats">

  <div>
    <b id="postCount">0</b>
    <p>Posts</p>
  </div>

  <div>
    <b id="followersCount">120</b>
    <p>Followers</p>
  </div>

  <div>
    <b id="followingCount">80</b>
    <p>Following</p>
  </div>

</div>

    <h3 id="profileName">your_name</h3>
    <p id="profileBio">Frontend Developer 💻</p>

    <button class="edit-btn" onclick="openEdit()">Edit Profile</button>

  </div>
</section>

<!-- HIGHLIGHTS -->
<div class="highlights">

  <div class="highlight">
    <img src="https://picsum.photos/80?1">
    <p>Travel</p>
  </div>

  <div class="highlight">
    <img src="https://picsum.photos/80?2">
    <p>Food</p>
  </div>

  <div class="highlight">
    <img src="https://picsum.photos/80?3">
    <p>Life</p>
  </div>

</div>

<hr>

<!-- POSTS GRID -->
<h4 class="grid-title">Posts</h4>

<div class="grid">

  <img src="https://picsum.photos/300?1">
  <img src="https://picsum.photos/300?2">
  <img src="https://picsum.photos/300?3">
  <img src="https://picsum.photos/300?4">
  <img src="https://picsum.photos/300?5">
  <img src="https://picsum.photos/300?6">

</div>
<div id="editBox" class="edit-box">

  <h3>Edit Profile</h3>

  <input type="text" id="newName" placeholder="Enter name">
  <input type="text" id="newBio" placeholder="Enter bio">
  <input type="file" id="newPic" accept="image/*">

  <button onclick="saveProfile()">Save</button>
  <button onclick="closeEdit()">Cancel</button>

</div>
<script>
// OPEN EDIT BOX
function openEdit() {
  document.getElementById("editBox").style.display = "block";

  document.getElementById("newName").value =
    document.getElementById("profileName").innerText;

  document.getElementById("newBio").value =
    document.getElementById("profileBio").innerText;
}

// CLOSE EDIT BOX
function closeEdit() {
  document.getElementById("editBox").style.display = "none";
}

// SAVE PROFILE
function saveProfile() {

  let name = document.getElementById("newName").value;
  let bio = document.getElementById("newBio").value;
  let picFile = document.getElementById("newPic").files[0];

  // Save Name
  if (name) {
    document.getElementById("profileName").innerText = name;
    localStorage.setItem("instaName", name);
  }

  // Save Bio
  if (bio) {
    document.getElementById("profileBio").innerText = bio;
    localStorage.setItem("instaBio", bio);
  }

  // Save Profile Picture
  if (picFile) {

    let reader = new FileReader();

    reader.onload = function(e) {

      let imageData = e.target.result;

      document.getElementById("profilePic").src = imageData;

      localStorage.setItem("instaPic", imageData);
    };

    reader.readAsDataURL(picFile);
  }

  closeEdit();
}

// LOAD SAVED PROFILE
window.onload = function(){
  // Set default values once
  if(!localStorage.getItem("followers")){
    localStorage.setItem("followers", 120);
  }

  if(!localStorage.getItem("following")){
    localStorage.setItem("following", 80);
  }

  document.getElementById("followersCount").innerText =
    localStorage.getItem("followers");

  document.getElementById("followingCount").innerText =
    localStorage.getItem("following");

  // Existing code
  let name = localStorage.getItem("instaName");
  let bio = localStorage.getItem("instaBio");
  let pic = localStorage.getItem("instaPic");

  if(name){
    document.getElementById("profileName").innerText = name;
  }

  if(bio){
    document.getElementById("profileBio").innerText = bio;
  }

  if(pic){
    document.getElementById("profilePic").src = pic;
  }
  let followers =
localStorage.getItem("followers");

if(followers){
  document.getElementById("followersCount").innerText =
  followers;
}
};
</script>

</body>
</html>
